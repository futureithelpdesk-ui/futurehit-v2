<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE HELPDESK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }
        .subtitle {
            color: #888;
            margin: 1rem 0;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button.notif-btn {
            background: #4285F4;
        }
        button:hover {
            opacity: 0.8;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .success {
            color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
        }
        .error {
            color: #ff4444;
            background: rgba(255, 0, 0, 0.1);
        }
        .info {
            color: #ffcc00;
            background: rgba(255, 204, 0, 0.1);
        }
        .note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
        #status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔥 FUTURE HELPDESK</h1>
        <p class="subtitle">Team Future is live!</p>

        <div id="status" class="info">🔔 Click "Enable Notifications" first</div>

        <button id="enableBtn" class="notif-btn">🔔 Enable Notifications</button>

        <textarea id="messageInput" placeholder="Type your broadcast message..."></textarea>

        <button id="broadcastBtn">📡 Send Broadcast Notification</button>

        <div id="result" class="message"></div>

        <div class="note">Pure Browser Notification • No Backend Required</div>
    </div>

    <script>
        // ---------- DOM ELEMENTS ----------
        const statusDiv = document.getElementById('status');
        const enableBtn = document.getElementById('enableBtn');
        const broadcastBtn = document.getElementById('broadcastBtn');
        const messageInput = document.getElementById('messageInput');
        const resultDiv = document.getElementById('result');

        // ---------- CHECK NOTIFICATION PERMISSION ----------
        function updateStatus() {
            if (!('Notification' in window)) {
                statusDiv.textContent = '❌ Notifications not supported in this browser.';
                statusDiv.className = 'message error';
                enableBtn.style.display = 'none';
                return;
            }

            if (Notification.permission === 'granted') {
                statusDiv.textContent = '✅ Notifications ENABLED! You will receive alerts.';
                statusDiv.className = 'message success';
                enableBtn.style.display = 'none';
            } else if (Notification.permission === 'denied') {
                statusDiv.textContent = '❌ Notifications BLOCKED. Please enable from browser settings.';
                statusDiv.className = 'message error';
                enableBtn.style.display = 'none';
            } else {
                statusDiv.textContent = '🔔 Click "Enable Notifications" to receive alerts.';
                statusDiv.className = 'message info';
                enableBtn.style.display = 'block';
            }
        }

        // ---------- ENABLE NOTIFICATIONS ----------
        enableBtn.addEventListener('click', async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    statusDiv.textContent = '✅ Notifications ENABLED!';
                    statusDiv.className = 'message success';
                    enableBtn.style.display = 'none';
                    // Send test notification
                    new Notification('🔥 FUTURE HELPDESK', {
                        body: 'Notifications are now enabled! You will receive broadcasts.',
                        icon: 'https://saytohellofuture.cc.cd/favicon.ico'
                    });
                    resultDiv.textContent = '✅ Test notification sent! Check your screen.';
                    resultDiv.className = 'message success';
                } else {
                    statusDiv.textContent = '❌ Permission denied. Please enable from browser settings.';
                    statusDiv.className = 'message error';
                }
            } catch (error) {
                statusDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.className = 'message error';
            }
        });

        // ---------- SEND BROADCAST NOTIFICATION ----------
        broadcastBtn.addEventListener('click', () => {
            const message = messageInput.value.trim();

            if (!message) {
                resultDiv.textContent = '❌ Please enter a message first!';
                resultDiv.className = 'message error';
                return;
            }

            if (Notification.permission !== 'granted') {
                resultDiv.textContent = '❌ Please enable notifications first! Click "Enable Notifications" button.';
                resultDiv.className = 'message error';
                return;
            }

            try {
                // Send the notification
                new Notification('📡 FUTURE HELPDESK BROADCAST', {
                    body: message,
                    icon: 'https://saytohellofuture.cc.cd/favicon.ico'
                });

                resultDiv.textContent = '✅ Broadcast notification sent successfully!';
                resultDiv.className = 'message success';
                messageInput.value = '';

            } catch (error) {
                resultDiv.textContent = '❌ Error sending notification: ' + error.message;
                resultDiv.className = 'message error';
            }
        });

        // ---------- INIT ----------
        updateStatus();

        // ---------- TEST NOTIFICATION ON LOAD (if already granted) ----------
        if (Notification.permission === 'granted') {
            setTimeout(() => {
                new Notification('🔥 FUTURE HELPDESK', {
                    body: 'Welcome back! You are ready to receive broadcasts.',
                    icon: 'https://saytohellofuture.cc.cd/favicon.ico'
                });
            }, 1000);
        }

        console.log('🔥 FUTURE HELPDESK loaded!');
        console.log('Notification permission:', Notification.permission);
    </script>

</body>
</html>
