<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE HELPDESK</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }
        p {
            color: #888;
            margin: 1rem 0;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            margin: 10px 0;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.85;
        }
        .btn-notif {
            background: #4285F4;
        }
        .btn-send {
            background: #ff3333;
        }
        .btn-google {
            background: #ea4335;
        }
        .btn-logout {
            background: #555;
        }
        .btn-test {
            background: #34a853;
        }
        #status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .green {
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00;
        }
        .red {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4444;
        }
        .yellow {
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
        }
        .note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
        #log {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            min-height: 30px;
        }
        .user-area {
            margin-top: 20px;
            padding: 20px;
            border-top: 1px solid #333;
        }
        .admin-panel {
            margin-top: 20px;
            border: 1px solid #ff3333;
            padding: 20px;
            border-radius: 8px;
        }
        .subscriber-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #222;
            padding: 8px 0;
            font-size: 0.9rem;
        }
        .hide {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <h1>🔥 FUTURE HELPDESK</h1>
        <p id="subtitle">Team Future is live!</p>

        <!-- LOGIN SECTION -->
        <div id="loginSection">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button id="loginBtn">Sign In</button>
            <button id="googleBtn" class="btn-google">Sign in with Google</button>
            <div id="loginMessage" class="yellow" style="margin-top:10px;"></div>
            <button id="showSignUpBtn" style="background:transparent;color:#888;font-size:0.8rem;margin-top:10px;">Don't have an account? Sign Up</button>
        </div>

        <!-- SIGNUP SECTION -->
        <div id="signupSection" class="hide">
            <input type="email" id="signupEmail" placeholder="Email Address" required>
            <input type="password" id="signupPassword" placeholder="Password" required>
            <button id="signupBtn">Create Account</button>
            <div id="signupMessage" class="yellow" style="margin-top:10px;"></div>
            <button id="showLoginBtn" style="background:transparent;color:#888;font-size:0.8rem;margin-top:10px;">Already have an account? Sign In</button>
        </div>

        <!-- USER DASHBOARD -->
        <div id="userSection" class="hide">
            <div class="user-area">
                <p>✅ Welcome, <span id="userEmail"></span>!</p>
                <div id="status" class="yellow">🔔 Click "Enable Notifications"</div>
                <button id="enableBtn" class="btn-notif">🔔 Enable Notifications</button>
                <button id="testBtn" class="btn-test hide">🔊 Test Notification</button>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>

            <!-- ADMIN PANEL -->
            <div id="adminSection" class="admin-panel hide">
                <h3>⚡ Admin Panel</h3>
                <div style="margin:15px 0;">
                    <h4>📡 Send Broadcast</h4>
                    <textarea id="msgInput" placeholder="Type your broadcast message..."></textarea>
                    <button id="sendBtn" class="btn-send">📡 Send Broadcast</button>
                    <div id="log" class="yellow"></div>
                </div>
                <div>
                    <h4>👥 Subscribers</h4>
                    <div id="subscriberList"></div>
                </div>
            </div>
        </div>

        <div class="note">🔊 Pure Browser Notification • Works 100%</div>
    </div>

    <script>
        // ---------- 🔥 SUPABASE DETAILS ----------
        const SUPABASE_URL = 'https://wrsctddishgwflfbnfcx.supabase.co';
        const SUPABASE_ANON_KEY =
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indyc2N0ZGRpc2hnd2ZsZmJuZmN4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1OTY0NTgsImV4cCI6MjA5OTE3MjQ1OH0.-r7Aha9CiPNC-r4ztqNnN3JVsQTdbupBnSuUPW_TKpg';

        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const loginSection = document.getElementById('loginSection');
        const signupSection = document.getElementById('signupSection');
        const userSection = document.getElementById('userSection');
        const adminSection = document.getElementById('adminSection');

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const loginMessage = document.getElementById('loginMessage');

        const signupEmail = document.getElementById('signupEmail');
        const signupPassword = document.getElementById('signupPassword');
        const signupBtn = document.getElementById('signupBtn');
        const signupMessage = document.getElementById('signupMessage');

        const userEmailSpan = document.getElementById('userEmail');
        const logoutBtn = document.getElementById('logoutBtn');

        const statusDiv = document.getElementById('status');
        const enableBtn = document.getElementById('enableBtn');
        const testBtn = document.getElementById('testBtn');
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const logDiv = document.getElementById('log');
        const subscriberList = document.getElementById('subscriberList');

        const showSignUpBtn = document.getElementById('showSignUpBtn');
        const showLoginBtn = document.getElementById('showLoginBtn');

        let currentUser = null;
        let isAdmin = false;

        // UI Functions
        function showLoginForm() {
            loginSection.classList.remove('hide');
            signupSection.classList.add('hide');
            userSection.classList.add('hide');
        }

        function showSignUpForm() {
            loginSection.classList.add('hide');
            signupSection.classList.remove('hide');
            userSection.classList.add('hide');
        }

        function showUserDashboard(user) {
            loginSection.classList.add('hide');
            signupSection.classList.add('hide');
            userSection.classList.remove('hide');
            userEmailSpan.textContent = user.email;
            currentUser = user;
            checkAdmin(user.id);
            updateNotificationStatus();
        }

        // Check Admin
        async function checkAdmin(userId) {
            const { data } = await _supabase
                .from('user_roles')
                .select('role')
                .eq('user_id', userId)
                .eq('role', 'admin')
                .single();

            isAdmin = !!data;
            if (isAdmin) {
                adminSection.classList.remove('hide');
                fetchSubscribers();
            } else {
                adminSection.classList.add('hide');
            }
        }

        // Fetch Subscribers
        async function fetchSubscribers() {
            const { data } = await _supabase
                .from('subscribers')
                .select('*')
                .order('created_at', { ascending: false });

            if (!data || data.length === 0) {
                subscriberList.innerHTML = '<p style="color:#555;">No subscribers yet.</p>';
                return;
            }

            subscriberList.innerHTML = data.map(sub =>
                `<div class="subscriber-item">
                    <span>${sub.email || 'No email'}</span>
                    <span style="color:#888;font-size:0.8rem;">${sub.codename || 'Anonymous'} • ${sub.phone || 'No phone'}</span>
                </div>`
            ).join('');
        }

        // Notifications
        async function sendNotification(title, body) {
            if (!('Notification' in window)) return;
            if (Notification.permission !== 'granted') return;
            new Notification(title, { body: body, icon: 'https://saytohellofuture.cc.cd/favicon.ico' });
        }

        function updateNotificationStatus() {
            if (!('Notification' in window)) {
                statusDiv.textContent = '❌ Notifications not supported';
                statusDiv.className = 'red';
                enableBtn.classList.add('hide');
                testBtn.classList.add('hide');
                return;
            }

            const perm = Notification.permission;

            if (perm === 'granted') {
                statusDiv.textContent = '✅ Notifications ENABLED!';
                statusDiv.className = 'green';
                enableBtn.classList.add('hide');
                testBtn.classList.remove('hide');
                logDiv.textContent = '✅ Ready to broadcast!';
            } else if (perm === 'denied') {
                statusDiv.textContent = '❌ Notifications BLOCKED. Enable from browser settings.';
                statusDiv.className = 'red';
                enableBtn.classList.add('hide');
                testBtn.classList.add('hide');
            } else {
                statusDiv.textContent = '🔔 Click "Enable Notifications" to start.';
                statusDiv.className = 'yellow';
                enableBtn.classList.remove('hide');
                testBtn.classList.add('hide');
            }
        }

        enableBtn.addEventListener('click', async () => {
            try {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    updateNotificationStatus();
                    sendNotification('🔥 FUTURE HELPDESK', 'Notifications are now enabled!');
                    logDiv.textContent = '✅ Notifications enabled!';
                } else {
                    statusDiv.textContent = '❌ Permission denied.';
                    statusDiv.className = 'red';
                }
            } catch (error) {
                logDiv.textContent = '❌ Error: ' + error.message;
            }
        });

        testBtn.addEventListener('click', async () => {
            try {
                await sendNotification('🔊 TEST', 'This is a test notification!');
                logDiv.textContent = '✅ Test notification sent!';
            } catch (error) {
                logDiv.textContent = '❌ Error: ' + error.message;
            }
        });

        // Broadcast
        sendBtn.addEventListener('click', async () => {
            const msg = msgInput.value.trim();

            if (!msg) {
                logDiv.textContent = '❌ Please type a message first!';
                return;
            }

            if (Notification.permission !== 'granted') {
                logDiv.textContent = '❌ Please enable notifications first!';
                return;
            }

            try {
                await sendNotification('📡 FUTURE HELPDESK', msg);
                logDiv.textContent = '✅ Broadcast sent successfully!';
                msgInput.value = '';
            } catch (error) {
                logDiv.textContent = '❌ Error: ' + error.message;
            }
        });

        // Login
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            if (!email || !password) {
                loginMessage.textContent = '❌ Please fill in all fields.';
                return;
            }
            loginMessage.textContent = '⏳ Logging in...';
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                loginMessage.textContent = '❌ ' + error.message;
                return;
            }
            if (data.user) {
                loginMessage.textContent = '✅ Welcome back!';
                showUserDashboard(data.user);
            }
        });

        // Google Login
        googleBtn.addEventListener('click', async () => {
            loginMessage.textContent = '⏳ Redirecting to Google...';
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.origin }
            });
            if (error) {
                loginMessage.textContent = '❌ ' + error.message;
            }
        });

        // Signup
        signupBtn.addEventListener('click', async () => {
            const email = signupEmail.value;
            const password = signupPassword.value;
            if (!email || !password) {
                signupMessage.textContent = '❌ Please fill in all fields.';
                return;
            }
            signupMessage.textContent = '⏳ Creating account...';
            const { data, error } = await _supabase.auth.signUp({ email, password });
            if (error) {
                signupMessage.textContent = '❌ ' + error.message;
                return;
            }
            signupMessage.textContent = '✅ Account created! Please verify your email.';
            setTimeout(showLoginForm, 2000);
        });

        // Toggle
        showSignUpBtn.addEventListener('click', showSignUpForm);
        showLoginBtn.addEventListener('click', showLoginForm);

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await _supabase.auth.signOut();
            currentUser = null;
            isAdmin = false;
            showLoginForm();
        });

        // Auto Check User
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                showUserDashboard(user);
            }
        }
        checkUser();

        if (window.location.hash && window.location.hash.includes('access_token')) {
            setTimeout(checkUser, 2000);
        }

        updateNotificationStatus();
        console.log('🔥 FUTURE HELPDESK loaded!');
    </script>

</body>
</html>
