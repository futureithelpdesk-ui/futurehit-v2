<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE HELPDESK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }
        .subtitle {
            color: #888;
            margin: 1rem 0;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            margin: 10px 0;
            resize: vertical;
        }
        button {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.85;
        }
        .btn-notif {
            background: #4285F4;
        }
        .btn-send {
            background: #ff3333;
        }
        .btn-test {
            background: #34a853;
        }
        #status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.95rem;
        }
        .green {
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00;
        }
        .red {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4444;
        }
        .yellow {
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
        }
        .note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
        #log {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #aaa;
            min-height: 30px;
        }
        .counter {
            font-size: 0.8rem;
            color: #666;
            margin: 5px 0;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔥 FUTURE HELPDESK</h1>
        <p class="subtitle">Team Future is live!</p>

        <div id="status" class="yellow">🔔 Click "Enable Notifications"</div>

        <button id="enableBtn" class="btn-notif">🔔 Enable Notifications</button>
        <button id="testBtn" class="btn-test" style="display:none;">🔊 Test Notification</button>

        <textarea id="msgInput" placeholder="Type your broadcast message..."></textarea>

        <button id="sendBtn" class="btn-send">📡 Send Broadcast</button>

        <div id="log"></div>

        <div class="note">🔊 Pure Browser Notification • Works 100%</div>
    </div>

    <script>
        // ---------- DOM ----------
        const statusDiv = document.getElementById('status');
        const enableBtn = document.getElementById('enableBtn');
        const testBtn = document.getElementById('testBtn');
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const logDiv = document.getElementById('log');

        // ---------- UPDATE STATUS ----------
        function updateStatus() {
            if (!('Notification' in window)) {
                statusDiv.textContent = '❌ Notifications not supported in this browser';
                statusDiv.className = 'red';
                enableBtn.style.display = 'none';
                testBtn.style.display = 'none';
                return;
            }

            const perm = Notification.permission;

            if (perm === 'granted') {
                statusDiv.textContent = '✅ Notifications ENABLED! Ready to broadcast.';
                statusDiv.className = 'green';
                enableBtn.style.display = 'none';
                testBtn.style.display = 'block';
                logDiv.textContent = '✅ Notification permission granted. You can send broadcasts.';
            } else if (perm === 'denied') {
                statusDiv.textContent = '❌ Notifications BLOCKED. Please enable from browser settings.';
                statusDiv.className = 'red';
                enableBtn.style.display = 'none';
                testBtn.style.display = 'none';
                logDiv.textContent = '❌ Go to browser settings → Privacy → Notifications → Allow this site.';
            } else {
                statusDiv.textContent = '🔔 Click "Enable Notifications" to start receiving alerts.';
                statusDiv.className = 'yellow';
                enableBtn.style.display = 'block';
                testBtn.style.display = 'none';
                logDiv.textContent = '';
            }
        }

        // ---------- ENABLE NOTIFICATIONS ----------
        enableBtn.addEventListener('click', async () => {
            try {
                logDiv.textContent = '⏳ Asking for permission...';
                const permission = await Notification.requestPermission();

                if (permission === 'granted') {
                    statusDiv.textContent = '✅ Notifications ENABLED!';
                    statusDiv.className = 'green';
                    enableBtn.style.display = 'none';
                    testBtn.style.display = 'block';

                    // Send welcome notification
                    new Notification('🔥 FUTURE HELPDESK', {
                        body: 'Notifications are now enabled! You will receive broadcasts.',
                        icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔥</text></svg>'
                    });

                    logDiv.textContent = '✅ Notifications enabled! Test notification sent.';
                } else {
                    statusDiv.textContent = '❌ Permission denied. Please allow from browser settings.';
                    statusDiv.className = 'red';
                    logDiv.textContent = '❌ You denied permission. Enable manually from browser settings.';
                }
            } catch (error) {
                logDiv.textContent = '❌ Error: ' + error.message;
                statusDiv.textContent = '❌ Error enabling notifications';
                statusDiv.className = 'red';
            }
        });

        // ---------- TEST NOTIFICATION ----------
        testBtn.addEventListener('click', () => {
            try {
                new Notification('🔊 FUTURE HELPDESK TEST', {
                    body: 'This is a test notification! If you see this, it works!',
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔥</text></svg>'
                });
                logDiv.textContent = '✅ Test notification sent! Check your screen.';
            } catch (error) {
                logDiv.textContent = '❌ Error: ' + error.message;
            }
        });

        // ---------- SEND BROADCAST ----------
        sendBtn.addEventListener('click', () => {
            const msg = msgInput.value.trim();

            if (!msg) {
                logDiv.textContent = '❌ Please type a message first!';
                return;
            }

            if (Notification.permission !== 'granted') {
                logDiv.textContent = '❌ Please enable notifications first! Click "Enable Notifications" button.';
                return;
            }

            try {
                new Notification('📡 FUTURE HELPDESK BROADCAST', {
                    body: msg,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔥</text></svg>'
                });

                logDiv.textContent = '✅ Broadcast sent successfully!';
                msgInput.value = '';

            } catch (error) {
                logDiv.textContent = '❌ Error sending broadcast: ' + error.message;
            }
        });

        // ---------- KEYBOARD SHORTCUT ----------
        msgInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                sendBtn.click();
            }
        });

        // ---------- INIT ----------
        updateStatus();

        // ---------- AUTO WELCOME NOTIFICATION (if already granted) ----------
        if (Notification.permission === 'granted') {
            setTimeout(() => {
                new Notification('🔥 FUTURE HELPDESK', {
                    body: 'Welcome back! Ready to broadcast.',
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔥</text></svg>'
                });
            }, 1500);
        }

        console.log('🔥 FUTURE HELPDESK loaded!');
        console.log('Notification permission:', Notification.permission);
    </script>

</body>
</html>
