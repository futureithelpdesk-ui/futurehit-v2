<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE HELPDESK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            text-align: center;
            max-width: 500px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }
        .subtitle {
            color: #888;
            margin: 1rem 0;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }
        .btn-notif {
            background: #4285F4;
        }
        .btn-send {
            background: #ff3333;
        }
        button:hover {
            opacity: 0.8;
        }
        #status {
            padding: 12px;
            margin: 10px 0;
            border-radius: 4px;
            font-weight: bold;
        }
        .green {
            background: rgba(0, 255, 0, 0.15);
            color: #00ff00;
        }
        .red {
            background: rgba(255, 0, 0, 0.15);
            color: #ff4444;
        }
        .yellow {
            background: rgba(255, 204, 0, 0.15);
            color: #ffcc00;
        }
        .note {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #555;
        }
        #log {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #aaa;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔥 FUTURE HELPDESK</h1>
        <p class="subtitle">Team Future is live!</p>

        <div id="status" class="yellow">🔔 Click "Enable Notifications"</div>

        <button id="enableBtn" class="btn-notif">🔔 Enable Notifications</button>

        <textarea id="msgInput" placeholder="Type your broadcast message..."></textarea>

        <button id="sendBtn" class="btn-send">📡 Send Broadcast</button>

        <div id="log"></div>

        <div class="note">🔊 Pure Browser Notification • Works 100%</div>
    </div>

    <script>
        // ---------- DOM ----------
        const statusDiv = document.getElementById('status');
        const enableBtn = document.getElementById('enableBtn');
        const sendBtn = document.getElementById('sendBtn');
        const msgInput = document.getElementById('msgInput');
        const logDiv = document.getElementById('log');

        // ---------- UPDATE STATUS ----------
        function updateStatus() {
            if (!('Notification' in window)) {
                statusDiv.textContent = '❌ Notifications not supported';
                statusDiv.className = 'red';
                enableBtn.style.display = 'none';
                return;
            }

            if (Notification.permission === 'granted') {
                statusDiv.textContent = '✅ Notifications ENABLED!';
                statusDiv.className = 'green';
                enableBtn.style.display = 'none';
            } else if (Notification.permission === 'denied') {
                statusDiv.textContent = '❌ Notifications BLOCKED. Enable from browser settings.';
                statusDiv.className = 'red';
                enableBtn.style.display = 'none';
            } else {
                statusDiv.textContent = '🔔 Click "Enable Notifications" to start.';
                statusDiv.className = 'yellow';
                enableBtn.style.display = 'block';
            }
        }

        // ---------- ENABLE ----------
        enableBtn.addEventListener('click', async () => {
            try {
                const p = await Notification.requestPermission();
                if (p === 'granted') {
                    statusDiv.textContent = '✅ Notifications ENABLED!';
                    statusDiv.className = 'green';
                    enableBtn.style.display = 'none';
                    new Notification('🔥 FUTURE HELPDESK', {
                        body: 'You will now receive broadcasts!',
                        icon: '/favicon.ico'
                    });
                    logDiv.textContent = '✅ Test notification sent! Check your screen.';
                } else {
                    statusDiv.textContent = '❌ Permission denied.';
                    statusDiv.className = 'red';
                }
            } catch (e) {
                statusDiv.textContent = '❌ Error: ' + e.message;
                statusDiv.className = 'red';
            }
        });

        // ---------- SEND ----------
        sendBtn.addEventListener('click', () => {
            const msg = msgInput.value.trim();

            if (!msg) {
                logDiv.textContent = '❌ Please type a message first.';
                return;
            }

            if (Notification.permission !== 'granted') {
                logDiv.textContent = '❌ Please enable notifications first!';
                return;
            }

            try {
                new Notification('📡 FUTURE HELPDESK', {
                    body: msg,
                    icon: '/favicon.ico'
                });
                logDiv.textContent = '✅ Broadcast sent successfully!';
                msgInput.value = '';
            } catch (e) {
                logDiv.textContent = '❌ Error: ' + e.message;
            }
        });

        // ---------- START ----------
        updateStatus();

        // ---------- AUTO TEST ----------
        if (Notification.permission === 'granted') {
            setTimeout(() => {
                new Notification('🔥 FUTURE HELPDESK', {
                    body: 'Welcome back! Ready to broadcast.',
                    icon: '/favicon.ico'
                });
            }, 1500);
        }
    </script>

</body>
</html>
