<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUTURE HELPDESK</title>
    <!-- Supabase JS Library (Login ke liye) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
            padding: 2rem;
            border: 1px solid rgba(255, 51, 51, 0.3);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.5rem;
            color: #ff3333;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
        }
        .subtitle { color: #888; margin: 1rem 0; }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            color: white;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #ff3333;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
        }
        button.google-btn { background: #4285F4; }
        button:hover { opacity: 0.8; }
        .message { margin-top: 15px; color: #ffcc00; font-size: 0.9rem; }
        .user-area { margin-top: 20px; padding: 20px; border-top: 1px solid #333; }
        .logout-btn { background: #555; }
        .note { margin-top: 2rem; font-size: 0.8rem; color: #555; }
    </style>
</head>
<body>

    <div class="container" id="app">
        <h1>🔥 FUTURE HELPDESK</h1>
        <p class="subtitle">Team Future is live!</p>
        
        <!-- Login Form (Default visible) -->
        <div id="login-section">
            <input type="email" id="email" placeholder="Email Address" required>
            <input type="password" id="password" placeholder="Password" required>
            <button id="loginBtn">Sign In</button>
            <button id="googleBtn" class="google-btn">Sign in with Google</button>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- User Dashboard (Hidden by default, dikhega jab login ho jayega) -->
        <div id="user-section" style="display: none;">
            <div class="user-area">
                <p>✅ Welcome, <span id="userEmail"></span>!</p>
                <button id="logoutBtn" class="logout-btn">Logout</button>
            </div>
        </div>
        <div class="note">Secure Connection • Vercel + Supabase</div>
    </div>

    <script>
        // ---------- YAHAN SE SUPABASE CONNECT HO RAHA HAI ----------
        
        // 1. Apni Supabase URL aur ANON KEY yahan paste karo
        const SUPABASE_URL = 'https://wbjsyaehueyfjfbvngu.supabase.co';
        const SUPABASE_ANON_KEY = eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndianN5YWVodWV5amZqYmJ2bnVnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM1Mjk4MDksImV4cCI6MjA5OTEwNTgwOX0.GvScu5cNNJls0olGlmJ0HWibrIjmggXF36or0yhoEkY
        // 2. Supabase Client Initialize Karo
        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ---------- DOM Elements ----------
        const loginSection = document.getElementById('login-section');
        const userSection = document.getElementById('user-section');
        const userEmailSpan = document.getElementById('userEmail');
        const loginMessage = document.getElementById('loginMessage');

        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const googleBtn = document.getElementById('googleBtn');
        const logoutBtn = document.getElementById('logoutBtn');

        // ---------- FUNCTIONS ----------
        async function showUserDashboard(user) {
            loginSection.style.display = 'none';
            userSection.style.display = 'block';
            userEmailSpan.textContent = user.email;
        }

        async function showLoginForm() {
            loginSection.style.display = 'block';
            userSection.style.display = 'none';
            loginMessage.textContent = '';
        }

        // ---------- AUTH HANDLERS ----------
        // Email/Password Login
        loginBtn.addEventListener('click', async () => {
            const email = emailInput.value;
            const password = passwordInput.value;
            
            if (!email || !password) {
                loginMessage.textContent = '❌ Please fill in all fields.';
                return;
            }

            loginMessage.textContent = '⏳ Logging in...';
            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });

            if (error) {
                loginMessage.textContent = '❌ Login Failed: ' + error.message;
                return;
            }

            if (data.user) {
                loginMessage.textContent = '✅ Welcome back!';
                showUserDashboard(data.user);
            }
        });

        // Google Login
        googleBtn.addEventListener('click', async () => {
            loginMessage.textContent = '⏳ Redirecting to Google...';
            const { error } = await _supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://futurehit-v2.vercel.app' }
            });
            if (error) {
                loginMessage.textContent = '❌ Google Login Failed: ' + error.message;
            }
        });

        // Logout
        logoutBtn.addEventListener('click', async () => {
            await _supabase.auth.signOut();
            showLoginForm();
        });

        // ---------- AUTO CHECK: AGAR USER PEHLE SE LOGIN HAI? ----------
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                showUserDashboard(user);
            }
        }
        checkUser();

        // ---------- REDIRECT HANDLER (Google login ke baad wapas aane par) ----------
        // Agar URL mein #access_token hai toh matlab Google se wapas aaye hain
        if (window.location.hash && window.location.hash.includes('access_token')) {
            // Page refresh karne par Supabase automatically session handle kar lega
            // Hum bas check karenge ki user aa gaya ya nahi
            setTimeout(() => {
                checkUser();
            }, 1000);
        }

    </script>
</body>
</html>
